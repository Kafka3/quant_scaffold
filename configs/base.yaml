data:
  path: example_data/sample_ohlcv.csv

strategy:
  stochastic:
    k_period: 14
    d_period: 3
    smooth: 1
    oversold: 20
    overbought: 80

  pivots:
    left_bars: 3
    right_bars: 3
    min_separation: 3
    max_separation: 20
    strict: true

  trend:
    ema_period: 55
    lookback_bars: 12
    min_close_ratio: 1.0
    continuation_pullback_break: strict

  risk:
    atr_period: 14
    stop_buffer: 0.0
    rr_target: 2.0

  setup:
    setup_max_bars: 12
    replace_same_side_setup: true
    invalidate_on_stop_anchor_break: true

backtest:
  initial_cash: 100000
  fee_per_trade: 0.0
  slippage: 0.0
  allow_short: true
