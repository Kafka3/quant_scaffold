data:
  path: data/raw/BTCUSDT_5m_2024.csv

strategy:
  stochastic:
    k_period: 14
    d_period: 3
    smooth: 1
    oversold: 15
    overbought: 85

  pivots:
    left_bars: 4
    right_bars: 3
    min_separation: 3
    max_separation: 20
    strict: true

  trend:
    ema_period: 34
    lookback_bars: 24
    min_close_ratio: 0.80

  risk:
    atr_period: 14
    stop_buffer: 0.0
    rr_target: 2.0

  setup:
    setup_max_bars: 12
    replace_same_side_setup: true
    invalidate_on_stop_anchor_break: true

backtest:
  initial_cash: 100000
  fee_per_trade: 0.0
  slippage: 0.0
  allow_short: true
